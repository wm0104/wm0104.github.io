<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择添加源</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 浅色模式：纯白背景 */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --btn-bg: #f0f0f0;
            --btn-hover: #dcdcdc;
        }

        /* 深色模式：纯黑背景 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --btn-bg: #2a2a2a;
                --btn-hover: #444444;
            }
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: var(--text-color);
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .btn {
            display: block;
            width: 70%; /* 按钮宽度从100%缩小到70% */
            padding: 12px; /* 内边距缩小，按钮高度降低 */
            margin: 10px auto; /* 上下间距缩小，左右自动居中 */
            border: none;
            border-radius: 12px;
            font-size: 1rem; /* 字体缩小 */
            font-weight: 500;
            color: var(--text-color);
            background: var(--btn-bg);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--btn-hover);
        }

        .tip {
            color: var(--text-color);
            margin-top: 18px;
            font-size: 0.85rem;
            opacity: 0.7;
            transition: color 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>选择添加源</h1>
        <a href="sileo://source/https://wm0104.github.io/" class="btn">Sileo</a>
        <a href="saily://add?url=https://wm0104.github.io/" class="btn">Saily</a>
        <a href="zbra://sources/add?url=https://wm0104.github.io/" class="btn">Zebra</a>
        <p class="tip">点击对应按钮，自动唤起包管理器添加源</p>
    </div>
</body>
</html>
