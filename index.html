<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM0104 Source</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --card: #f2f2f7;
            --button: #f2f2f7;
            --hover: #dcdce2;
            --blue: #007aff;
            --gray: #8e8e93;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #f5f5f7;
                --card: #1c1c1e;
                --button: #1c1c1e;
                --hover: #2c2c2e;
                --blue: #0a84ff;
                --gray: #8e8e93;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .wrap {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 顶部小图标 */
        .icon-box {
            text-align: center;
            margin-bottom: 20px;
        }
        .icon {
            font-size: 50px;
            line-height: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .header p {
            font-size: 14px;
            color: var(--gray);
        }

        /* 毛玻璃卡片 */
        .source-card,
        .btn,
        .info,
        .plugin-list {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @media (prefers-color-scheme: dark) {
            .source-card,
            .btn,
            .info,
            .plugin-list {
                background: rgba(30, 30, 30, 0.3);
            }
        }

        .source-card {
            border-radius: 18px;
            padding: 22px;
            text-align: center;
            margin-bottom: 30px;
        }
        .source-card label {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 10px;
            display: block;
        }
        .source-url {
            width: 100%;
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            text-align: center;
            color: var(--text);
            margin-bottom: 12px;
        }
        .copy-btn {
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .copy-btn:active {
            transform: scale(0.98);
            background: #0066cc;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            color: var(--text);
            text-align: center;
            text-decoration: none;
            border-radius: 16px;
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .btn:active {
            transform: scale(0.98);
        }

        /* 插件列表 */
        .plugin-list {
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .plugin-list h2 {
            font-size: 17px;
            margin-bottom: 16px;
        }
        .plugin-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .plugin-item:last-child {
            border-bottom: none;
        }
        .plugin-name {
            font-size: 15px;
            font-weight: 500;
        }
        .plugin-desc {
            font-size: 13px;
            color: var(--gray);
        }

        .info {
            border-radius: 18px;
            padding: 24px;
        }
        .info h2 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .info p {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: var(--gray);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <!-- 顶部小图标 -->
        <div class="icon-box">
            <div class="icon">🧩</div>
        </div>

        <div class="header">
            <h1>WM0104 Source</h1>
            <p>iOS 越狱插件 · 自用备份仓库</p>
        </div>

        <div class="source-card">
            <label>源地址</label>
            <input type="text" class="source-url" id="source" value="https://wm0104.github.io/" readonly>
            <button class="copy-btn" onclick="copySource()">复制源地址</button>
        </div>

        <div class="btn-group">
            <a href="sileo://source/https://wm0104.github.io/" class="btn">Sileo 一键添加</a>
            <a href="saily://add?url=https://wm0104.github.io/" class="btn">Saily 一键添加</a>
            <a href="zbra://sources/add?https://wm0104.github.io/" class="btn">Zebra 一键添加</a>
        </div>

        <!-- 插件列表 -->
        <div class="plugin-list">
            <h2>📦 仓库插件</h2>
            <div class="plugin-item">
                <div>
                    <div class="plugin-name">DEB Backup</div>
                    <div class="plugin-desc">一键备份插件与配置</div>
                </div>
            </div>
            <div class="plugin-item">
                <div>
                    <div class="plugin-name">Repo Tools</div>
                    <div class="plugin-desc">源管理辅助工具</div>
                </div>
            </div>
        </div>

        <div class="info">
            <h2>关于仓库</h2>
            <p>自用备份插件</p>
        </div>

        <div class="footer">
            © 2026 WM0104
        </div>
    </div>

    <script>
        function copySource() {
            const i = document.getElementById("source");
            i.select();
            document.execCommand("copy");
            
            const btn = document.querySelector(".copy-btn");
            const old = btn.innerText;
            btn.innerText = "✅ 复制成功";
            setTimeout(() => btn.innerText = old, 1400);
        }
    </script>
</body>
</html>
