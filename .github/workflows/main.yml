name: "bark push"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  bark_push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: invalidunit/action/.github/workflows/bark_push_done.yml@main
    secrets:
      _key: ${{ secrets._key }}

  remove_all_old_actions:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: invalidunit/action/.github/workflows/remove_all_actions.yml@main          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions
