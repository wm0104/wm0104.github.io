name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # 拉取完整历史，避免文件残留

      - name: Clean Old Files
        run: |
          rm -rf ./Packages* # 强制删除所有旧的Packages文件
          rm -rf ./debs/*.deb # 可选：清理旧包（确保新包重新生成分类）

      - name: install depend
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        run: |
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          # 重新生成Packages（彻底覆盖旧文件）
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages
          # 压缩文件
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: Force Commit All Changes
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          git commit -m '彻底重建Packages，统一分类' --allow-empty
          git push