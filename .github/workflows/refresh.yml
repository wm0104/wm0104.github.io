name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          sudo dpkg-scanpackages -m ./debs /dev/null >./Packages
          

          awk '
            BEGIN { in_section = 0; has_section = 0 }

            /^Package:/ {
                mysec = "实用工具" # 默认兜底
                pkg = tolower($0)
                # 1. 最高优先级：hello强制归为系统增强
                if (pkg ~ /hello/) {
                    mysec = "系统增强"
                }
                print
                next
            }

            /^Description:/ {
                desc = tolower($0)
                # 2. 如果已经是系统增强(hello插件)，跳过后面判断
                if (mysec == "系统增强") {
                    print
                    next
                }
                
                # 3. 强力匹配：全局优化(优先级高于应用增强)
                # 关键词：广告、弹窗、流畅、省电、全局、修复、优化、去广告、隐藏、屏蔽
                if (desc ~ /广告|去广告|弹窗|流畅|省电|全局|修复|优化|屏蔽|隐藏|解锁/) {
                    mysec = "全局优化"
                }
                # 4. 强力匹配：应用增强(针对第三方APP功能)
                # 关键词：app|应用|抖音|快手|微信|qq|淘宝|功能|模块|增强|补丁
                else if (desc ~ /app|应用|抖音|快手|微信|qq|淘宝|模块|增强|补丁/) {
                    mysec = "应用增强"
                }
                # 5. 其余兜底：实用工具
                else {
                    mysec = "实用工具"
                }
                
                print
                next
            }

            /^Section:/ { 
              print "Section: " mysec
              in_section = 1
              has_section = 1
              next
            }
            /^[A-Za-z0-9-]+:/ { 
              if (in_section) {
                in_section = 0
              }
              print
              next
            }
            { print }
            END {
              if (!has_section) {
                print "Section: " mysec
              }
            }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages
        
          
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions