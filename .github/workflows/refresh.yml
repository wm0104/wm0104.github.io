name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

permissions:
  contents: write   # ⭐关键

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      # Step 2: Install dependencies for packaging
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y
          sudo apt install locales -y
          sudo locale-gen zh_CN.UTF-8
          export LANG=zh_CN.UTF-8

      # Step 3: Refresh the Packages file (create/update .deb package list)
      - name: Refresh Packages
        run: |
          mkdir -p ./debs
          chmod +r ./debs/*.deb || true
          for f in ./debs/*.deb; do
            base=$(basename "$f")
            newname=$(echo "$base" | iconv -f UTF-8 -t ASCII//TRANSLIT | tr ' ' '_' | tr -cd '[:alnum:]_-.')
            if [ "$base" != "$newname" ]; then
              mv "$f" "./debs/$newname"
            fi
          done
          rm -rf ./Packages*
          dpkg-scanpackages -m ./debs /dev/null > ./Packages
          bzip2 -k -9 Packages
          xz -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      # Step 4: Commit and push the changes
      - name: Commit & Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Refresh Packages"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi

      # Step 5: Download and install the remove_all_actions script
      - name: Download remove_all_actions
        run: |
          sudo curl -L -o /usr/bin/remove_all_actions https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions
          sudo chmod +x /usr/bin/remove_all_actions

      # Step 6: Run the remove_all_actions script to remove old actions
      - name: Remove all old actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: remove_all_actions

      # Step 7: Post Checkout (if needed)
      - name: Post Checkout
        run: echo "Post Checkout step completed"

      # Step 8: Complete job
      - name: Complete job
        run: echo "Build job completed"