name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: fix packages
        run: |
          # 1. 查找所有 arm64 的包，强制改为 arm64e (常用)
          # 2. 查找所有 arm64e 的包，标记为 Rootless (无分类)
          # 3. 清除原有的 Section 信息，避免残留
          sudo apt install -y dpkg-dev devscript
          dpkg-scanpackages . /dev/null | grep -v 'Package:' > /dev/null
          
          # 具体修改
          sed -i 's/^Package: arm64$/& arch=arm64e section=常用 priority=extra/' Packages
          sed -i 's/^Package: arm64e$/& arch=arm64 section=rootless priority=extra/' Packages
          
          # 压缩输出
          gzip -9 Packages
      - name: deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./