name: "refresh"  # 保持名称不变

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          # 1. 先生成原始 Packages，保留所有原有信息
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages.raw
          
          # 2. 核心逻辑：根据包路径中的类型子目录划分 Section
          # 假设路径格式为：debs/工具类/xxx.deb 或 debs/系统类/yyy.deb
          awk '
            BEGIN { current_type = "其他" }
            
            # 提取包的路径（从 Filename 字段获取）
            /^Filename:/ {
              # 示例：假设 Filename 为 "Filename: debs/工具类/abc.deb"
              if ($0 ~ /debs\/工具类\//) {
                current_type = "工具类"
              } else if ($0 ~ /debs\/系统类\//) {
                current_type = "系统类"
              } else if ($0 ~ /debs\/功能类\//) {
                current_type = "功能类"
              }
              print $0  # 输出原始 Filename 行
              next
            }
            
            # 处理 Section 字段，用 current_type 覆盖
            /^Section:/ {
              print "Section: " current_type
              current_type = "其他"  # 重置类型，避免跨包污染
              next
            }
            
            # 其他行原样输出
            { print $0 }
          ' Packages.raw > Packages
          
          # 3. 生成压缩文件
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst
          
          rm -f Packages.raw

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Fix: 按路径类型划分 Section'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions