name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          sudo dpkg-scanpackages -m ./debs /dev/null >./Packages
          

          awk '
            # 每个新插件开头，强制重置分类，彻底解决全局污染
            /^Package:/ {
              mysec = "实用工具"  # 默认兜底
              has_section = 0
              in_section = 0

              # 1. 最高优先级：包名带 hello → 强制系统增强
              pkg = tolower($0)
              if (pkg ~ /hello/) {
                mysec = "系统增强"
              }
              print
              next
            }

            # 2. 次高优先级：描述分类判断（完整4类逻辑）
            /^Description:/ {
              desc = tolower($0)
              # 仅当不是hello插件时，才做分类判断
              if (mysec != "系统增强") {
                # 2.1 全局优化（优先级高于应用增强）
                if (desc ~ /广告|去广告|弹窗|流畅|省电|全局|修复|优化|屏蔽|隐藏|解锁/) {
                  mysec = "全局优化"
                }
                # 2.2 应用增强
                else if (desc ~ /app|应用|抖音|快手|微信|qq|淘宝|模块|增强|补丁/) {
                  mysec = "应用增强"
                }
                # 2.3 系统增强（补充非hello的系统插件）
                else if (desc ~ /系统|状态栏|控制中心|锁屏|手势|桌面|cpu|充电|灵动|输入法/) {
                  mysec = "系统增强"
                }
                # 2.4 兜底：实用工具
                else {
                  mysec = "实用工具"
                }
              }
              print
              next
            }

            # 3. 强制覆盖Section字段，完全保留你原版的Section处理逻辑
            /^Section:/ { 
              print "Section: " mysec
              in_section = 1
              has_section = 1
              next
            }

            # 4. 完全保留你原版的Section后续行处理逻辑，一丝不动
            /^[A-Za-z0-9-]+:/ { 
              if (in_section) {
                in_section = 0
              }
              print
              next
            }

            # 5. 其他行原样输出
            { print }

            # 6. 兜底：如果没有Section，手动加上
            END {
              if (!has_section) {
                print "Section: " mysec
              }
            }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages
        
          
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions