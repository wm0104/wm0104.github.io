name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        run: |
          sudo apt update
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        run: |
          rm -rf Packages*
          chmod -R 0755 debs
          dpkg-scanpackages -m debs /dev/null > Packages

          awk '
            BEGIN {
              in_section = 0
              has_section = 0
            }

            /^Package:/ {
              mysec = "实用工具"
              pkg = tolower($0)
              if (pkg ~ /hello/)
                mysec = "系统增强"
              print
              next
            }

            /^Description:/ {
              desc = tolower($0)
              if (mysec != "系统增强") {
                if (desc ~ /广告|去广告|弹窗|流畅|省电|全局|修复|优化|解锁/) {
                  mysec = "全局优化"
                } else if (desc ~ /app|应用|抖音|快手|微信|qq|模块|增强|补丁/) {
                  mysec = "应用增强"
                } else if (desc ~ /系统|状态栏|控制中心|锁屏|手势|桌面|cpu|充电|灵动/) {
                  mysec = "系统增强"
                }
              }
              print
              next
            }

            /^Section:/ {
              print "Section: " mysec
              in_section = 1
              has_section = 1
              next
            }

            /^[A-Za-z0-9-]+:/ {
              if (in_section) in_section = 0
              print
              next
            }

            { print }

            END {
              if (!has_section)
                print "Section: " mysec
            }
          ' Packages > Packages.tmp && mv Packages.tmp Packages

          bzip2 -kf9 Packages
          xz -kf9 --extreme Packages
          zstd --ultra -22 -kf Packages -o Packages.zst

      - name: Push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages*
          git commit -m "Refresh packages" || true
          git push