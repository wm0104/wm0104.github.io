- name: Categorize .deb and modify Section
  run: |
    set -euo pipefail

    # 清理旧文件
    rm -rf ./Packages* ./Rootless ./RootHide\ Packages
    mkdir -p ./Rootless ./RootHide\ Packages

    for f in ./debs/*.deb; do
      [ -f "$f" ] || continue

      arch=$(dpkg-deb -f "$f" Architecture)
      tmpdir=$(mktemp -d /tmp/tmpdir.XXXX)
      cp "$f" "$tmpdir"
      cd "$tmpdir" || continue

      # 检查 control.tar.* 是否存在
      if ! ar t "$(basename "$f")" | grep -q 'control.tar.'; then
        echo "Skipping $f: no control.tar.* found"
        cd ..
        rm -rf "$tmpdir"
        continue
      fi

      # 解压 control
      ar x "$(basename "$f")" control.tar.* 2>/dev/null || true
      tar -xf control.tar.* 2>/dev/null || true

      # 修改 Section 并移动到对应目录
      if [ "$arch" = "iphoneos-arm64" ]; then
        sed -i 's/^Section: .*/Section: Rootless/' control || true
        mv "$(basename "$f")" ../Rootless/
      elif [ "$arch" = "iphoneos-arm64e" ]; then
        sed -i 's/^Section: .*/Section: RootHide/' control || true
        mv "$(basename "$f")" ../RootHide\ Packages/
      fi

      # 重新打包 control
      tar -czf control.tar.gz control md5sums 2>/dev/null || tar -czf control.tar.gz control 2>/dev/null
      ar rcs "$(basename "$f")" debian-binary control.tar.gz data.tar.* 2>/dev/null

      cd ..
      rm -rf "$tmpdir"
    done

    # 生成 Packages 文件
    for dir in ./Rootless ./RootHide\ Packages; do
      if [ -d "$dir" ] && [ "$(ls -A "$dir")" ]; then
        dpkg-scanpackages -m "$dir" /dev/null > "$dir/Packages"
        bzip2 -k -6 "$dir/Packages"
        xz -k -6 --extreme "$dir/Packages"
        zstd -19 -k "$dir/Packages" -o "$dir/Packages.zst"
      fi
    done