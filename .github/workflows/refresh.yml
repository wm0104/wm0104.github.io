name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Ensure Correct Permissions for .deb Files
        run: |
          echo "Checking and fixing permissions for .deb files"
          sudo chmod -R 755 ./debs
          ls -l ./debs

      - name: Check and Repair .deb Package Integrity
        run: |
          echo "Checking integrity of .deb packages"
          for deb in ./debs/*.deb; do
            if ! dpkg-deb --info "$deb" > /dev/null 2>&1; then
              echo "Error: Package $deb is corrupted or has issues."
              exit 1
            fi
            # Check if the control file exists inside the deb package
            dpkg-deb -x "$deb" /tmp/deb-extract
            if [ ! -f "/tmp/deb-extract/DEBIAN/control" ]; then
              echo "Error: Control file missing in $deb."
              exit 1
            fi
          done

      - name: Refresh Packages
        run: |
          rm -rf ./Packages*
          
          # 检查 ./debs 目录是否存在
          if [ ! -d "./debs" ]; then
            echo "Directory './debs' not found!"
            exit 1
          fi

          # 设置文件夹权限
          sudo chmod -R 755 ./debs

          # 生成 Packages.raw
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages.raw

          # 去掉所有图标
          sed -i '/^Icon:/d' Packages.raw
          # 去掉所有旧分类
          sed -i '/^Section:/d' Packages.raw

          > Packages
          while IFS= read -r line; do
            echo "$line" >> Packages

            if [[ "$line" =~ ^Architecture: ]]; then
              if echo "$line" | grep -q "arm64e"; then
                echo "Section: RootHide Packages" >> Packages
              else
                # 根据插件名称分类
                if echo "$line" | grep -q "tool|util|文件|终端|清理|备份|修复|工具"; then
                  echo "Section: 工具类" >> Packages
                  echo "分类为 工具类：" "$line"  # 输出调试信息
                elif echo "$line" | grep -q "enhance|plus|pro|增强|优化|加速|功能"; then
                  echo "Section: 增强类" >> Packages
                  echo "分类为 增强类：" "$line"  # 输出调试信息
                elif echo "$line" | grep -q "system|ui|桌面|状态栏|控制中心|锁屏|系统"; then
                  echo "Section: 系统类" >> Packages
                  echo "分类为 系统类：" "$line"  # 输出调试信息
                fi
              fi
            fi
          done < Packages.raw

          # 压缩生成的 Packages 文件
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: Configure Git
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'

      - name: Commit Changes
        run: |
          git add .
          if ! git diff --staged --exit-code; then
            git commit -m 'Refresh Packages [skip ci]'
          fi

      - name: Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git pull --rebase origin main
          git push origin main

      - name: Download remove_all_actions
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod +x '/usr/bin/remove_all_actions'

      - name: Remove All Old Actions
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions