name: "refresh"

# 触发条件：pages 构建部署完成且成功时触发
on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

# 权限声明：给 PAT 对应的写权限（关键修复）
permissions:
  contents: write
  actions: write  # 用于删除旧 Actions 运行记录

jobs:
  build:
    runs-on: ubuntu-latest
    # 仅在 pages 构建成功时执行
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages (自动分 Rootless / RootHide)
  run: |
    rm -rf ./Packages*
    dpkg-scanpackages -m ./debs /dev/null > Packages.raw

    # 生成最终 Packages
    > Packages

    # 逐行处理，按架构自动分分类
    while IFS= read -r line; do
      echo "$line" >> Packages
      if echo "$line" | grep -q '^Architecture:'; then
        if echo "$line" | grep -q 'arm64e'; then
          echo "Section: RootHide Packages" >> Packages
        else
          echo "Section: Rootless" >> Packages
        fi
        # 跳过原来的 Section
        read -r next_line
      fi
    done < Packages.raw

    # 压缩
    bzip2 -v -k -9 Packages
    xz -v -k -9 --extreme Packages
    zstd --ultra -22 -k Packages -o Packages.zst
      - name: Configure Git
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'

      - name: Commit Changes
        run: |
          git add .
          if ! git diff --staged --exit-code; then
            git commit -m 'Refresh Packages [skip ci]'
          fi

      - name: Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push origin main

      - name: Download remove_all_actions
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod +x '/usr/bin/remove_all_actions'

      - name: Remove All Old Actions
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions