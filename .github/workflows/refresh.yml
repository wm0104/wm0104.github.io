name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          # 【核心修复1：彻底清理旧包+递归授权所有deb，解决权限问题】
          rm -rf ./Packages*
          sudo chmod -R 0755 ./debs
          sudo chown -R $(whoami):$(whoami) ./debs
          
          # 【核心修复2：用绝对路径执行dpkg-scanpackages，避免路径错误】
          sudo dpkg-scanpackages -m $(pwd)/debs /dev/null > ./Packages
          

          # 【核心修复3：嵌入4分类逻辑，完全保留你原版的awk结构】
          awk '
            BEGIN { in_section = 0; has_section = 0 }

            /^Package:/ {
                mysec = "实用工具"
                pkg = tolower($0)
                if (pkg ~ /hello/) {
                    mysec = "系统增强"
                }
                print
                next
            }

            /^Description:/ {
                desc = tolower($0)
                if (mysec != "系统增强") {
                    if (desc ~ /系统|状态栏|控制中心|锁屏|手势|桌面|cpu|充电|灵动|输入法/) {
                        mysec = "系统增强"
                    } else if (desc ~ /广告|去广告|弹窗|流畅|省电|修复|优化|全局|屏蔽|隐藏|解锁/) {
                        mysec = "全局优化"
                    } else if (desc ~ /app|应用|抖音|快手|微信|qq|淘宝|功能|模块|增强|补丁/) {
                        mysec = "应用增强"
                    } else {
                        mysec = "实用工具"
                    }
                }
                print
                next
            }

            /^Section:/ { 
              print "Section: " mysec
              in_section = 1
              has_section = 1
              next
            }
            /^[A-Za-z0-9-]+:/ { 
              if (in_section) {
                in_section = 0
              }
              print
              next
            }
            { print }
            END {
              if (!has_section) {
                print "Section: " mysec
              }
            }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages
        
          
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions