name: Update Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages
          gzip -k -f Packages
          bzip2 -k -f Packages
          xz -k -f Packages
          zstd -k -f Packages

      - name: Commit & Push
        run: |
          git config --global user.name "wm0104"
          git config --global user.email "wm0104@users.noreply.github.com"
          git add Packages*
          git commit -m "Auto update Packages" || echo "No changes to commit"
          git push