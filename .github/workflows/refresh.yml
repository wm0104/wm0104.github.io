name: refresh

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Fix permissions
        run: |
          chmod -R 755 debs/
          find debs -name "*.deb" -exec chmod 644 {} \;

      - name: Generate Full Packages
        run: |
          LC_ALL=C.UTF-8 dpkg-scanpackages -m debs /dev/null > Packages

      # 1. 增强与功能
      - name: Build 增强与功能
        run: |
          mkdir -p 增强与功能
          grep -A 50 -E "Section:.*(Enhancements|Tweaks|Animation|Gesture)|Name:.*(增强|功能|动画|手势|解锁)|Description:.*(增强|功能|动画|手势|解锁)" Packages > 增强与功能/Packages || true
          bzip2 -k9 增强与功能/Packages

      # 2. 实用工具
      - name: Build 实用工具
        run: |
          mkdir -p 实用工具
          grep -A 50 -E "Section:.*(Utilities|Tools|Manager)|Name:.*(工具|管理|备份|文件|脚本)|Description:.*(工具|管理|备份|文件|脚本)" Packages > 实用工具/Packages || true
          bzip2 -k9 实用工具/Packages

      # 3. 系统调整
      - name: Build 系统调整
        run: |
          mkdir -p 系统调整
          grep -A 50 -E "Section:.*(System|System Tweaks|StatusBar|SpringBoard)|Name:.*(系统|状态栏|控制中心|内核|启动)|Description:.*(系统|状态栏|控制中心|内核|启动)" Packages > 系统调整/Packages || true
          bzip2 -k9 系统调整/Packages

      # 4. 应用与软件
      - name: Build 应用与软件
        run: |
          mkdir -p 应用与软件
          grep -A 50 -E "Section:.*(Applications|App|AppExt)|Name:.*(微信|QQ|Telegram|Safari|抖音|淘宝|应用|程序)|Description:.*(微信|QQ|Telegram|Safari|抖音|淘宝|应用|程序)" Packages > 应用与软件/Packages || true
          bzip2 -k9 应用与软件/Packages

      - name: Build full index
        run: |
          bzip2 -k9 Packages
          xz -k9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Refresh packages"
            git push
          fi