name: refresh
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate & Fix Permissions
        run: |
          cat > refresh.sh << 'EOF'
          #!/bin/bash
          set -e

          # 你的分类配置
          CATEGORIES=(
            "工具"
            "系统"
            "增强"
          )

          # 遍历分类并生成文件
          for CAT in "${CATEGORIES[@]}"; do
              echo "处理分类：$CAT"
              mkdir -p "./output/$CAT"
              
              # 示例：生成分类文件
              cat > "./output/$CAT/info.txt" << INFO
          分类：$CAT
          生成时间：$(date)
          INFO

              # 权限修复
              chmod -R 755 "./output/$CAT"
              chown -R root:root "./output/$CAT"
          done

          echo "✅ 所有分类生成完成！"
          EOF

          bash refresh.sh