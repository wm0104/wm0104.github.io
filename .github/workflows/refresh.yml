name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]

jobs:
  rebuild-packages:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Git身份
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: 清理旧文件
        run: |
          rm -f Packages Packages.bz2 Packages.xz Packages.zst
          git rm -f Packages* --ignore-unmatch
          git commit -m "清理旧Packages" --allow-empty

      - name: 创建分类目录
        run: |
          mkdir -p debs/工具类
          mkdir -p debs/系统类
          mkdir -p debs/增强类

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: 生成分类Packages（修复权限）
        run: |
          # 加sudo解决权限问题
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages
          bzip2 -k Packages
          xz -k Packages
          zstd -k Packages

      - name: 提交分类后的文件
        run: |
          git add .
          git commit -m "生成工具/系统/增强类分类Packages"
          git push