name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          sudo dpkg-scanpackages -m ./debs /dev/null >./Packages
          

          awk '
            BEGIN { in_section = 0; has_section = 0 }

            # 先判断包名：hello 一律系统类
            /^Package:/ {
              pkg = tolower($0)
              if (pkg ~ /hello/) {
                mysec = "系统类"
              } else {
                mysec = "工具类"
              }
              print
              next
            }

            # 再判断描述：只要有微信相关，强制微信类
            /^Description:/ {
              desc = tolower($0)
              if (mysec != "系统类") {
                if (desc ~ /微信|wechat|vx|密友|黄白|wechat/) {
                  mysec = "微信类"
                } else if (desc ~ /系统|ui|桌面|锁屏|状态栏|手势|控制中心|美化|dock/) {
                  mysec = "系统类"
                }
              }
              print
              next
            }

            /^Section:/ { 
              print "Section: " mysec
              in_section = 1
              has_section = 1
              next
            }

            /^[A-Za-z0-9-]+:/ { 
              if (in_section) in_section = 0
              print
              next
            }

            { print }

            END {
              if (!has_section) {
                print "Section: " mysec
              }
            }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages
        
          
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions