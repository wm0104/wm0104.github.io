name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          # 1. 先生成原始 Packages
          dpkg-scanpackages -m ./debs /dev/null >./Packages_raw

          # 2. 👇 核心步骤：根据插件名强制修改 Section
          # 语法说明：/^Package: 包名/,/^Section: / s/^Section: .*/Section: 工具/
          # 你可以添加多个 sed -i 语句，对应不同插件
          sed -i '/^Package: com.lclrc.hammerits/,/^Section: / s/^Section: .*/Section: 工具/' ./Packages_raw
          sed -i '/^Package: com.dao.hammerit/,/^Section: / s/^Section: .*/Section: 工具/' ./Packages_raw
          # 👇 在这里继续添加更多插件...
          # sed -i '/^Package: 你的下一个包名/,/^Section: / s/^Section: .*/Section: 工具/' ./Packages_raw

          # 3. 将处理好的内容保存为正式的 Packages
          mv ./Packages_raw ./Packages

          # 4. 继续压缩
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages & Fix Section for HammerIt'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions