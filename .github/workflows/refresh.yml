name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y gh -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          sudo dpkg-scanpackages -m ./debs /dev/null >./Packages
          

          awk '
            BEGIN { current_section = "工具类" }

            /^Package:/ {
              pkg = tolower($0)
              # 只要包名带 hello → 全部系统类
              if (pkg ~ /hello/) {
                current_section = "系统类"
                next
              }
            }

            /^Description:/ {
              desc = tolower($0)
              if (desc ~ /微信|wechat|vx/) {
                current_section = "微信类"
              }
              else if (desc ~ /系统|ui|桌面|锁屏|状态栏|手势|全局|设置|美化|控制中心|dock/) {
                current_section = "系统类"
              }
              else {
                current_section = "工具类"
              }
            }

            /^Section:/ { print "Section: " current_section; next }

            { print }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages
        
          
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 2>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      # 【修复】用GitHub官方gh命令清理旧工作流，替代无效的remove_all_actions
      - name: Remove old actions runs
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 列出所有refresh工作流的运行记录，删除除了最新10条之外的所有
          gh run list --workflow refresh.yml --limit 50 --json databaseId --jq '.[].databaseId' | tail -n +11 | xargs -I {} gh run delete {} --yes