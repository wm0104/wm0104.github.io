name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          sudo dpkg-scanpackages -m ./debs /dev/null >./Packages
          

          awk '
            # 初始化变量
            BEGIN { 
              current_section = "工具类"  # 默认兜底
              has_section = 0
            }

            # 1. 捕获包名，做最高优先级判断
            /^Package:/ {
              pkg = tolower($0)
              # 只要包名含 hello -> 强制系统类
              if (pkg ~ /hello/) {
                current_section = "系统类"
              }
              next
            }

            # 2. 捕获描述，做分类判断
            /^Description:/ {
              desc = tolower($0)
              # 如果还没被强制归为系统类（比如不是hello插件）
              if (current_section != "系统类") {
                if (desc ~ /微信|wechat|vx/) {
                  current_section = "微信类"
                } else if (desc ~ /系统|ui|桌面|锁屏|状态栏|手势|全局|设置|美化|控制中心|dock/) {
                  current_section = "系统类"
                } else {
                  current_section = "工具类"
                }
              }
              print
              next
            }

            # 3. 覆盖Section字段
            /^Section:/ { 
              print "Section: " current_section
              has_section = 1
              next
            }

            # 4. 其他行原样输出
            { print }

            # 5. 兜底：如果没有Section字段，手动加上
            END {
              if (!has_section) {
                print "Section: " current_section
              }
            }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages
        
          
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      # 【保留】你原来的清理旧动作步骤
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions