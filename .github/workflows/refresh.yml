name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs/
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages.raw

          # 清理所有旧图标、旧分类
          sed -i '/^Icon:/d' Packages.raw
          sed -i '/^Section:/d' Packages.raw

          # 核心逻辑：只恢复你原来的结构
          awk '
            /^Architecture:/ {
              print $0
              if ($0 ~ /arm64e/) {
                print "Section: RootHide Packages"
              } else {
                print "Section: Rootless"
              }
              next
            }
            1
          ' Packages.raw > Packages

          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

          rm -f Packages.raw

      - name: Configure Git
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'

      - name: Commit Changes
        run: |
          git add .
          if ! git diff --staged --exit-code; then
            git commit -m 'Revert: 恢复原来的 Rootless 分类 / 删除重复分类'
          fi

      - name: Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git pull --rebase origin main
          git push origin main

      - name: Download remove_all_actions
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod +x '/usr/bin/remove_all_actions'

      - name: Remove All Old Actions
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions