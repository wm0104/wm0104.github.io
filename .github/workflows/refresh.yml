name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd fakeroot -y

      - name: Auto fix Section by package name
        run: |
          TMP_DIR="/tmp/fix_deb"

          for deb in ./debs/*.deb; do
            [ -f "$deb" ] || continue

            PKG=$(dpkg-deb -I "$deb" 2>/dev/null | grep ^Package: | awk '{print $2}')
            [ -z "$PKG" ] && continue

            # ======================
            # 按用途精准分类
            # 系统类 / 微信类 / 状态类 / 工具类
            # ======================
            SECTION=""

            # 微信类
            if [[ "$PKG" == *"wechat"* || "$PKG" == *"wx"* ]]; then
              SECTION="微信类"

            # 状态类：状态栏相关
            elif [[ "$PKG" == *"status"* || "$PKG" == *"state"* || "$PKG" == *"bar"* ]]; then
              SECTION="状态类"

            # 系统类：越狱核心、Bootstrap、root、hide
            elif [[ "$PKG" == *"system"* || "$PKG" == *"sys"* || "$PKG" == *"bootstrap"* || "$PKG" == *"root"* || "$PKG" == *"hide"* ]]; then
              SECTION="系统类"

            # 工具类：默认，你的插件、实用工具
            elif [[ "$PKG" == *"hammerit"* || "$PKG" == *"wm0104"* || "$PKG" == *"tool"* || "$PKG" == *"util"* ]]; then
              SECTION="工具类"

            else
              # 不认识的全部归为工具类
              SECTION="工具类"
            fi

            rm -rf "$TMP_DIR"
            mkdir -p "$TMP_DIR"
            dpkg-deb -R "$deb" "$TMP_DIR"
            sed -i "s/^Section:.*/Section: $SECTION/" "$TMP_DIR/DEBIAN/control"
            fakeroot dpkg-deb -b "$TMP_DIR" "$deb"
            rm -rf "$TMP_DIR"
          done

      - name: Refresh Packages
        run: |
          rm -rf ./Packages*
          dpkg-scanpackages -m ./debs /dev/null >./Packages
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi

      - name: download remove_all_actions
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions