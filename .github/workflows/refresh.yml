name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          sudo rm -rf ./Packages*  # 使用 sudo 确保有足够权限
          sudo dpkg-scanpackages -m ./debs /dev/null > ./Packages  # 使用 sudo 处理 deb 文件
          sudo bzip2 -v -k -9 Packages  # 使用 sudo 执行压缩操作
          sudo xz -v -k -9 --extreme Packages  # 使用 sudo 执行压缩操作
          sudo zstd --ultra -22 -k Packages -o Packages.zst  # 使用 sudo 执行压缩操作

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions