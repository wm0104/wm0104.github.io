name: refresh

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      # 先生成完整 Packages
      - name: Scan all debs
        run: |
          dpkg-scanpackages -m debs /dev/null > Packages

      # ==================== 4 分类自动拆分 ====================
      # 1. 增强与功能
      - name: Build 增强与功能
        run: |
          mkdir -p 增强与功能
          grep -A 30 "Section:.*Enhancements" Packages > 增强与功能/Packages || true
          bzip2 -k9 增强与功能/Packages

      # 2. 实用工具
      - name: Build 实用工具
        run: |
          mkdir -p 实用工具
          grep -A 30 "Section:.*Utilities" Packages > 实用工具/Packages || true
          bzip2 -k9 实用工具/Packages

      # 3. 系统调整
      - name: Build 系统调整
        run: |
          mkdir -p 系统调整
          grep -A 30 "Section:.*System" Packages > 系统调整/Packages || true
          bzip2 -k9 系统调整/Packages

      # 4. 应用与软件
      - name: Build 应用与软件
        run: |
          mkdir -p 应用与软件
          grep -A 30 "Section:.*Applications" Packages > 应用与软件/Packages || true
          bzip2 -k9 应用与软件/Packages

      # ==================== 生成总索引 ====================
      - name: Build full index
        run: |
          bzip2 -k9 Packages
          xz -k9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      # 提交更新
      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto refresh 4 categories"
            git push
          fi