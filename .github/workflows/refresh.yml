name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          sudo dpkg-scanpackages -m ./debs /dev/null >./Packages
          

          awk '
            # 【核心修复】每个插件独立重置分类，彻底解决污染
            /^Package:/ {
              # 每个新插件开头，强制重置分类为工具类（兜底）
              mysec = "工具类"
              has_section = 0
              in_section = 0

              # 1. 最高优先级：包名带 hello → 系统类
              pkg = tolower($0)
              if (pkg ~ /hello/) {
                mysec = "系统类"
              }
              print
              next
            }

            # 2. 次高优先级：描述带微信 → 微信类（覆盖系统类，仅当不是hello插件）
            /^Description:/ {
              desc = tolower($0)
              # 只有当前不是系统类（不是hello插件），才判断微信
              if (mysec != "系统类") {
                if (desc ~ /微信|wechat|vx|密友|黄白/) {
                  mysec = "微信类"
                }
                # 3. 第三优先级：不是微信类，才判断系统类
                else if (desc ~ /系统|ui|桌面|锁屏|状态栏|手势|控制中心|美化|dock|充电|cpu|输入法|icleaner/) {
                  mysec = "系统类"
                }
                # 否则保持工具类
              }
              print
              next
            }

            # 4. 强制覆盖Section字段，用当前插件的独立分类
            /^Section:/ { 
              print "Section: " mysec
              has_section = 1
              in_section = 1
              next
            }

            # 5. 完全保留你原版的Section后续行处理逻辑，一丝不动
            /^[A-Za-z0-9-]+:/ { 
              if (in_section) {
                in_section = 0
              }
              print
              next
            }

            # 6. 其他行原样输出
            { print }

            # 7. 兜底：如果没有Section，手动加上
            END {
              if (!has_section) {
                print "Section: " mysec
              }
            }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages
        
          
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions