name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

permissions:
  contents: write   # ⭐关键

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      - name: install depend
        run: |
          sudo apt update
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      # ⭐⭐⭐ 这里是新增的（自动清理 deb）⭐⭐⭐
      - name: Clean deb packages
        run: |
          if ls ./debs/*.deb 1> /dev/null 2>&1; then
            for deb in ./debs/*.deb; do
              echo "Processing $deb"

              mkdir temp
              dpkg-deb -R "$deb" temp

              CONTROL_FILE="temp/DEBIAN/control"

              sed -i '/^Depiction:/d' $CONTROL_FILE
              sed -i '/^Icon:/d' $CONTROL_FILE
              sed -i '/^Homepage:/d' $CONTROL_FILE
              sed -i 's/^Description:.*/Description: ./g' $CONTROL_FILE

              dpkg-deb -b temp "$deb"
              rm -rf temp
            done
          else
            echo "No deb files found"
          fi

      - name: Refresh Packages
        run: |
          rm -rf ./Packages*
          dpkg-scanpackages -m ./debs /dev/null > ./Packages
          bzip2 -k -9 Packages
          xz -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --quiet; then
            git commit -m 'Refresh Packages'
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi

      - name: download remove_all_actions
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod +x '/usr/bin/remove_all_actions'

      - name: remove all old actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions