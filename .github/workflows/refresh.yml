name: "refresh"

# 触发条件：pages 构建部署完成且成功时触发
on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

# 权限声明：给 PAT 对应的写权限（关键修复）
permissions:
  contents: write
  actions: write  # 用于删除旧 Actions 运行记录

jobs:
  build:
    runs-on: ubuntu-latest
    # 仅在 pages 构建成功时执行
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages (强制统一分类+去重+无图标)
        run: |
          rm -rf ./Packages*
          dpkg-scanpackages -m ./debs /dev/null > ./Packages.tmp

          # 1. 彻底删除所有 Icon 行，无图标
          sed -i '/^Icon:/d' ./Packages.tmp

          # 2. 彻底删除所有旧 Section 行，杜绝残留
          sed -i '/^Section:/d' ./Packages.tmp

          # 3. 统一插入唯一的 RootHide Packages 分类
          awk '/^Architecture:/ {print; print "Section: RootHide Packages"; next} 1' ./Packages.tmp > ./Packages

          # 4. 压缩包
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: Configure Git
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'

      - name: Commit Changes
        run: |
          git add .
          if ! git diff --staged --exit-code; then
            git commit -m 'Refresh Packages [skip ci]'
          fi

      - name: Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          # 修复之前的推送冲突，用 --rebase 拉取后再推
          git pull --rebase origin main
          git push origin main

      - name: Download remove_all_actions
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod +x '/usr/bin/remove_all_actions'

      - name: Remove All Old Actions
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions