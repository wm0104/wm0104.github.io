name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: install depend
        run: |
          sudo apt update -y
          sudo apt install -y dpkg-dev bzip2 xz-utils zstd

      - name: Refresh Packages
        run: |
          rm -rf ./Packages*
          sudo chmod -R 755 ./debs
          sudo chown -R root:root ./debs
          dpkg-scanpackages -m ./debs /dev/null > ./Packages

          awk '
            /^Package:/ {
                sec = "实用工具"
                pkg = tolower($0)
                if (pkg ~ /hello/) sec = "系统增强"
                print
                next
            }

            /^Description:/ {
                desc = tolower($0)
                if (sec != "系统增强") {
                    if (desc ~ /系统|状态栏|控制中心|锁屏|手势|桌面|cpu|充电|灵动|输入法/) {
                        sec = "系统增强"
                    } else if (desc ~ /广告|去广告|弹窗|流畅|省电|修复|优化|全局|屏蔽|隐藏|解锁/) {
                        sec = "全局优化"
                    } else if (desc ~ /app|应用|抖音|快手|微信|qq|淘宝|模块|增强|补丁/) {
                        sec = "应用增强"
                    }
                }
                print
                next
            }

            /^Section:/ { next }
            /^[A-Za-z0-9-]+:/ { print; next }
            { print }
          ' ./Packages > ./Packages.tmp && mv ./Packages.tmp ./Packages

          bzip2 -f9 Packages
          xz -f9 --extreme Packages
          zstd --ultra -22 -f Packages -o Packages.zst

      - name: Push changes
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"
          git add Packages*
          git commit -m "Refresh: 4 分类完全生效" || true
          git push