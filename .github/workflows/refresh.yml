name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          # 生成原始Packages
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages.raw
          
          # 核心逻辑：同时处理架构（RootHide）和路径分类（工具/系统/功能）
          awk '
            BEGIN { current_type = "其他" }
            
            # 1. 先判断架构（arm64e对应RootHide Packages）
            /^Architecture:/ {
              if ($2 == "arm64e") {
                current_section = "RootHide Packages"
              }
              print $0
              next
            }
            
            # 2. 再判断路径分类（覆盖非arm64e的Section）
            /^Filename:/ {
              # 仅当不是RootHide时，才按路径分工具/系统/功能
              if (current_section != "RootHide Packages") {
                if ($0 ~ /debs\/工具类\//) current_section = "工具类"
                else if ($0 ~ /debs\/系统类\//) current_section = "系统类"
                else if ($0 ~ /debs\/功能类\//) current_section = "功能类"
                else current_section = "其他"
              }
              print $0
              next
            }
            
            # 3. 写入最终的Section
            /^Section:/ {
              print "Section: " current_section
              current_section = ""  # 重置，避免跨包污染
              next
            }
            
            # 其他行原样输出
            { print $0 }
          ' Packages.raw > Packages
          
          # 压缩文件
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst
          
          rm -f Packages.raw

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Fix: 新增工具类/系统类/功能类分类'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions
