name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      # Step 2: Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install dpkg-dev bzip2 xz-utils zstd binutils -y

      # Step 3: Categorize .deb and modify Section safely
      - name: Categorize .deb and modify Section
        run: |
          set -euo pipefail

          # 清理旧文件
          rm -rf ./Packages* Rootless RootHide
          mkdir -p Rootless RootHide

          for f in ./debs/*.deb; do
            [ -f "$f" ] || continue

            arch=$(dpkg-deb -f "$f" Architecture)
            tmpdir=$(mktemp -d /tmp/tmpdir.XXXX)
            cp "$f" "$tmpdir"
            cd "$tmpdir" || continue

            # 尝试解压 control
            if ! ar x "$(basename "$f")" control.tar.*; then
              echo "Warning: Failed to extract $f"
              cd ..
              rm -rf "$tmpdir"
              continue
            fi

            tar -xf control.tar.* || true

            # 根据架构修改 Section
            if [ "$arch" = "iphoneos-arm64" ]; then
              sed -i 's/^Section: .*/Section: Rootless/' control || true
              mv "$(basename "$f")" ../Rootless/
            elif [ "$arch" = "iphoneos-arm64e" ]; then
              sed -i 's/^Section: .*/Section: RootHide/' control || true
              mv "$(basename "$f")" ../RootHide/
            fi

            # 重新打包 control
            tar -czf control.tar.gz control md5sums 2>/dev/null || tar -czf control.tar.gz control 2>/dev/null
            ar rcs "$(basename "$f")" debian-binary control.tar.gz data.tar.* 2>/dev/null

            cd ..
            rm -rf "$tmpdir"
          done

          # 生成 Packages 文件（安全压缩等级）
          for dir in Rootless RootHide; do
            if [ -d "$dir" ] && [ "$(ls -A "$dir")" ]; then
              dpkg-scanpackages -m "./$dir" /dev/null > "./$dir/Packages"
              bzip2 -k -6 "./$dir/Packages"
              xz -k -6 --extreme "./$dir/Packages"
              zstd -19 -k "./$dir/Packages" -o "./$dir/Packages.zst"
            fi
          done

      # Step 4: Commit & Push
      - name: Commit & Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Refresh Packages with architecture-based Sections"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      # Step 5: Download remove_all_actions
      - name: Download remove_all_actions
        run: |
          sudo curl -L -o /usr/bin/remove_all_actions https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions
          sudo chmod +x /usr/bin/remove_all_actions

      # Step 6: Remove all old actions
      - name: Remove all old actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: remove_all_actions