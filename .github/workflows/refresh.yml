name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          # 生成原始Packages
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages.raw
          
          # 核心：无“其他”类，所有包分到4个分类
          awk '
            BEGIN { section = "功能类" } # 默认兜底（后续可补充规则）
            
            /^Name:/ {
              pkg_name = $0
              # 1. RootHide专属分类
              if (pkg_name ~ /RootHide/) {
                section = "RootHide Packages"
              }
              # 2. 工具类（匹配“工具/复制/激活码”类功能）
              else if (pkg_name ~ /工具|CopyVault|激活码|Tool|备份/) {
                section = "工具类"
              }
              # 3. 系统类（匹配“系统优化/屏蔽/系统级功能”）
              else if (pkg_name ~ /系统|屏蔽|App Store|优化|权限|System/) {
                section = "系统类"
              }
              # 4. 功能类（其余所有包默认归到这里）
              else {
                section = "功能类"
              }
              print $0
              next
            }
            
            # 强制覆盖Section
            /^Section:/ {
              print "Section: " section
              section = "功能类" # 重置默认值
              next
            }
            
            { print $0 }
          ' Packages.raw > Packages
          
          # 压缩文件
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst
          
          rm -f Packages.raw

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Fix: 移除其他类，所有包分工具/系统/功能/RootHide'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions