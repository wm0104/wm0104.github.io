name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          dpkg-scanpackages -m ./debs /dev/null >./Packages

          # ========== 自动按插件用途修改分类 ==========
          # 微信类
          sed -i '/^Package:.*wechat/,/^Section:/ s/^Section:.*/Section: 微信类/' ./Packages
          sed -i '/^Package:.*wx/,/^Section:/ s/^Section:.*/Section: 微信类/' ./Packages

          # 状态类
          sed -i '/^Package:.*status/,/^Section:/ s/^Section:.*/Section: 状态类/' ./Packages
          sed -i '/^Package:.*bar/,/^Section:/ s/^Section:.*/Section: 状态类/' ./Packages
          sed -i '/^Package:.*state/,/^Section:/ s/^Section:.*/Section: 状态类/' ./Packages

          # 系统类
          sed -i '/^Package:.*system/,/^Section:/ s/^Section:.*/Section: 系统类/' ./Packages
          sed -i '/^Package:.*sys/,/^Section:/ s/^Section:.*/Section: 系统类/' ./Packages
          sed -i '/^Package:.*bootstrap/,/^Section:/ s/^Section:.*/Section: 系统类/' ./Packages
          sed -i '/^Package:.*root/,/^Section:/ s/^Section:.*/Section: 系统类/' ./Packages
          sed -i '/^Package:.*hide/,/^Section:/ s/^Section:.*/Section: 系统类/' ./Packages

          # 工具类（你的插件默认）
          sed -i '/^Package:.*hammerit/,/^Section:/ s/^Section:.*/Section: 工具类/' ./Packages
          sed -i '/^Package:.*wm0104/,/^Section:/ s/^Section:.*/Section: 工具类/' ./Packages
          sed -i '/^Package:.*tool/,/^Section:/ s/^Section:.*/Section: 工具类/' ./Packages
          sed -i '/^Package:.*util/,/^Section:/ s/^Section:.*/Section: 工具类/' ./Packages
          # ============================================

          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Refresh Packages'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions