name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow.conclusion == 'success' && github.event.workflow.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        run: |
          rm -rf ./Packages*
          sudo chmod -R 0755 ./debs/
          sudo dpkg-scanpackages -m ./debs > Packages.raw

          awk '
            /^Icon:/    { next }
            /^Section:/ { next }

            /^Package:/ {
              pkg = tolower($0)
              print $0
              next
            }

            /^Architecture:/ {
              print $0
              if ($0 ~ /arm64e/) {
                print "Section: RootHide Packages"
              } else {
                if (pkg ~ /tool|util|文件|终端|清理|备份|修复|工具/)
                  print "Section: 工具"
                else if (pkg ~ /system|ui|桌面|状态栏|控制中心|锁屏|系统/)
                  print "Section: 系统"
                else if (pkg ~ /enhance|plus|pro|增强|优化|加速|功能/)
                  print "Section: 增强"
                else
                  print "Section: 工具"
              }
              next
            }
            1
          ' Packages.raw > Packages

          bzip2 -k -9 Packages
          xz -k -9 Packages
          zstd -k --ultra -22 Packages

          rm -f Packages.raw

      - name: Git Config
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Commit & Push
        run: |
          git add Packages*
          if ! git diff --staged --quiet; then
            git commit -m "Update packages [skip ci]"
            git push
          fi