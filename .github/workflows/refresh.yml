name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install depend
        if: success()
        run: |
          sudo apt update 2>>/dev/null 1>>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y

      - name: Refresh Packages
        if: success()
        run: |
          rm -rf ./Packages*
          
          sudo chmod -R 0755 ./debs
          sudo chown -R runner:runner ./debs
          
          # 生成原始Packages
          sudo dpkg-scanpackages -m ./debs /dev/null > Packages.raw
          
          # 核心：按包名关键词划分Section（直接匹配包名，不依赖路径）
          awk '
            /^Name:/ {
              # 记录当前包名
              pkg_name = $0
              # 按包名关键词分类
              if (pkg_name ~ /工具|Tool|工具类/) {
                section = "工具类"
              } else if (pkg_name ~ /系统|System|系统类/) {
                section = "系统类"
              } else if (pkg_name ~ /功能|Func|功能类/) {
                section = "功能类"
              } else if (pkg_name ~ /RootHide/) {
                section = "RootHide Packages"
              } else {
                section = "其他"
              }
              print $0
              next
            }
            
            # 覆盖Section字段
            /^Section:/ {
              print "Section: " section
              next
            }
            
            # 其他行原样输出
            { print $0 }
          ' Packages.raw > Packages
          
          # 压缩文件
          bzip2 -v -k -9 Packages
          xz -v -k -9 --extreme Packages
          zstd --ultra -22 -k Packages -o Packages.zst
          
          rm -f Packages.raw

      - name: save change if local change
        if: success()
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>>/dev/null; then
            git commit -m 'Fix: 按包名关键词划分分类'
            git push
          fi
          
      - name: download remove_all_actions
        if: success()
        run: |
          sudo curl -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions'
          sudo chmod -R 0755 '/usr/bin/remove_all_actions'

      - name: remove all old actions
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions